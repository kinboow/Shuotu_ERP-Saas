name: Deploy GHCR Images

permissions:
  contents: read
  packages: read

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Image tag to deploy
        required: false
        default: latest
  workflow_run:
    workflows:
      - Build And Push GHCR Images
    types:
      - completed

jobs:
  deploy:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Determine deploy image tag
        id: tag
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "image_tag=${{ github.event.inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "image_tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare image variables
        id: vars
        shell: bash
        run: |
          echo "owner_lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"
          echo "archive_name=shuotu-ghcr-images-${{ steps.tag.outputs.image_tag }}.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull deploy images from GHCR
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.tag.outputs.image_tag }}"
          namespace="ghcr.io/${{ steps.vars.outputs.owner_lc }}"
          services=(migrator web admin-web admin-api gateway sync-engine oms wms pms misc oss webhook)
          for service in "${services[@]}"; do
            docker pull "${namespace}/shuotu-erp-${service}:${tag}"
          done

      - name: Export deploy images archive
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.tag.outputs.image_tag }}"
          namespace="ghcr.io/${{ steps.vars.outputs.owner_lc }}"
          mkdir -p "${GITHUB_WORKSPACE}/.deploy-cache"
          archive_path="${GITHUB_WORKSPACE}/.deploy-cache/${{ steps.vars.outputs.archive_name }}"
          images=()
          services=(migrator web admin-web admin-api gateway sync-engine oms wms pms misc oss webhook)
          for service in "${services[@]}"; do
            images+=("${namespace}/shuotu-erp-${service}:${tag}")
          done
          docker save "${images[@]}" | gzip -1 > "$archive_path"

      - name: Prepare server deploy cache
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            set -e
            mkdir -p "${{ secrets.PROD_APP_DIR }}/.deploy-cache"

      - name: Upload deploy images archive
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          source: .deploy-cache/${{ steps.vars.outputs.archive_name }}
          target: ${{ secrets.PROD_APP_DIR }}

      - name: Upload deploy support files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          source: deploy-ghcr.sh,docker-compose.ghcr.yml
          target: ${{ secrets.PROD_APP_DIR }}

      - name: Deploy to production server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          command_timeout: 40m
          script: |
            set -e
            cd "${{ secrets.PROD_APP_DIR }}"
            chmod +x deploy-ghcr.sh
            ARCHIVE_PATH="${{ secrets.PROD_APP_DIR }}/.deploy-cache/${{ steps.vars.outputs.archive_name }}"
            if [ ! -f "$ARCHIVE_PATH" ]; then
              ALT_ARCHIVE_PATH="${{ secrets.PROD_APP_DIR }}/${{ steps.vars.outputs.archive_name }}"
              if [ -f "$ALT_ARCHIVE_PATH" ]; then
                ARCHIVE_PATH="$ALT_ARCHIVE_PATH"
              fi
            fi
            if [ ! -f "$ARCHIVE_PATH" ]; then
              echo "[错误] 未找到镜像归档: ${{ steps.vars.outputs.archive_name }}"
              find "${{ secrets.PROD_APP_DIR }}" -maxdepth 3 -name "${{ steps.vars.outputs.archive_name }}" -print || true
              exit 1
            fi
            gunzip -c "$ARCHIVE_PATH" | docker load
            rm -f "$ARCHIVE_PATH"
            SKIP_GHCR_LOGIN=1 \
            SKIP_IMAGE_PULL=1 \
            GHCR_NAMESPACE_OVERRIDE="ghcr.io/${{ steps.vars.outputs.owner_lc }}" \
            IMAGE_TAG_OVERRIDE="${{ steps.tag.outputs.image_tag }}" \
            ./deploy-ghcr.sh
