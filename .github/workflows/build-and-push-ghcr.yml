name: Build And Push GHCR Images

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: admin-api
            dockerfile: docker/admin-api.Dockerfile
          - service: admin-web
            dockerfile: docker/admin-web.Dockerfile
          - service: gateway
            dockerfile: docker/gateway.Dockerfile
          - service: migrator
            dockerfile: docker/migrator.Dockerfile
          - service: misc
            dockerfile: docker/misc.Dockerfile
          - service: oms
            dockerfile: docker/oms.Dockerfile
          - service: oss
            dockerfile: docker/oss.Dockerfile
          - service: pms
            dockerfile: docker/pms.Dockerfile
          - service: sync-engine
            dockerfile: docker/sync-engine.Dockerfile
          - service: web
            dockerfile: docker/web.Dockerfile
          - service: webhook
            dockerfile: docker/webhook.Dockerfile
          - service: wms
            dockerfile: docker/wms.Dockerfile

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare image variables
        id: vars
        shell: bash
        run: |
          echo "owner_lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"
          echo "sha_short=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.vars.outputs.owner_lc }}/shuotu-erp-${{ matrix.service }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref_name == 'main' || github.ref_name == github.event.repository.default_branch }}
            type=raw,value=sha-${{ steps.vars.outputs.sha_short }}
            type=ref,event=branch
            type=ref,event=tag

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
